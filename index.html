<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Wallpaper World Pro</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
/* ===== GLOBAL ===== */
body {
    margin: 0;
    font-family: "Poppins", Arial, sans-serif;
    background: radial-gradient(circle at top, #141e30, #0a0a0f);
    color: white;
    overflow-x: hidden;
}

/* ===== HEADER ===== */
header {
    text-align: center;
    padding: 40px 20px 20px;
}

header h1 {
    font-size: 38px;
    margin: 0;
    background: linear-gradient(90deg, #ff00cc, #3333ff);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
}

header p {
    opacity: 0.7;
    margin-top: 5px;
}

/* ===== SEARCH ===== */
.search-box {
    margin: 20px auto;
    width: 60%;
    display: flex;
    justify-content: center;
}

.search-box input {
    width: 100%;
    padding: 14px 18px;
    border-radius: 30px;
    border: none;
    outline: none;
    text-align: center;
    font-size: 15px;
    background: rgba(255,255,255,0.08);
    color: white;
    backdrop-filter: blur(10px);
    box-shadow: 0 10px 25px rgba(0,0,0,0.3);
}

/* ===== CATEGORIES ===== */
.categories {
    display: flex;
    justify-content: center;
    gap: 12px;
    flex-wrap: wrap;
    margin: 20px 0;
}

.cat {
    padding: 10px 18px;
    border-radius: 25px;
    background: rgba(255,255,255,0.08);
    border: 1px solid rgba(255,255,255,0.1);
    cursor: pointer;
    transition: 0.3s;
    backdrop-filter: blur(10px);
    font-size: 14px;
}

.cat:hover {
    transform: scale(1.1);
    background: linear-gradient(90deg, #ff00cc, #3333ff);
}

/* ===== GALLERY ===== */
.gallery {
    column-count: 4;
    column-gap: 15px;
    padding: 20px;
}

@media (max-width: 1000px) { .gallery { column-count: 3; } }
@media (max-width: 700px) { .gallery { column-count: 2; } }
@media (max-width: 500px) { .gallery { column-count: 1; } }

.wallpaper {
    break-inside: avoid;
    margin-bottom: 15px;
    border-radius: 16px;
    overflow: hidden;
    cursor: pointer;
    position: relative;
    transition: 0.3s;
}

.wallpaper img {
    width: 100%;
    display: block;
    border-radius: 16px;
    transition: 0.4s;
}

.wallpaper:hover img {
    transform: scale(1.08);
    filter: brightness(1.15);
}

/* ===== HOVER LABEL ===== */
.wallpaper::after {
    content: "View";
    position: absolute;
    bottom: 10px;
    left: 10px;
    background: rgba(0,0,0,0.5);
    padding: 5px 10px;
    font-size: 12px;
    border-radius: 20px;
    opacity: 0;
    transition: 0.3s;
}

.wallpaper:hover::after {
    opacity: 1;
}

/* ===== VIEWER ===== */
.viewer {
    display: none;
    position: fixed;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    background: rgba(0,0,0,0.95);
    justify-content: center;
    align-items: center;
    flex-direction: column;
    z-index: 999;
}

.viewer img {
    max-width: 90%;
    max-height: 80%;
    border-radius: 18px;
    box-shadow: 0 0 40px rgba(255,0,204,0.3);
}

.btn {
    margin-top: 15px;
    padding: 12px 25px;
    border-radius: 30px;
    border: none;
    cursor: pointer;
    background: linear-gradient(90deg, #ff00cc, #3333ff);
    color: white;
    text-decoration: none;
}

.close {
    position: absolute;
    top: 20px;
    right: 25px;
    font-size: 30px;
    cursor: pointer;
}
</style>
</head>

<body>

<header>
    <h1>Wallpaper World Pro</h1>
    <p>Premium HD Wallpapers</p>
</header>

<!-- SEARCH -->
<div class="search-box">
    <input type="text" id="searchBox" placeholder="Search wallpapers..." onkeyup="searchWallpapers()">
</div>

<!-- CATEGORIES -->
<div class="categories">
    <div class="cat" onclick="filter('all')">All</div>
    <div class="cat" onclick="filter('nature')">Nature</div>
    <div class="cat" onclick="filter('anime')">Anime</div>
    <div class="cat" onclick="filter('cars')">Cars</div>
</div>

<!-- GALLERY -->
<div class="gallery" id="gallery"></div>

<!-- VIEWER -->
<div class="viewer" id="viewer">
    <span class="close" onclick="closeViewer()">×</span>
    <img id="viewerImg">
    <a id="downloadBtn" class="btn" download>Download</a>
</div>

<script>
let wallpapers = [
    { url: "https://images.unsplash.com/photo-1500530855697-b586d89ba3ee", category: "nature" },
    { url: "https://images.unsplash.com/photo-1519681393784-d120267933ba", category: "nature" },
    { url: "https://images.unsplash.com/photo-1518770660439-4636190af475", category: "cars" },
    { url: "https://images.unsplash.com/photo-1549924231-f129b911e442", category: "anime" }
];

/* RENDER */
function renderWallpapers(category) {
    let gallery = document.getElementById("gallery");
    gallery.innerHTML = "";

    wallpapers.forEach(w => {
        if (category === "all" || w.category === category) {
            let div = document.createElement("div");
            div.className = "wallpaper";

            div.innerHTML = `
                <img src="${w.url}" onclick="openViewer('${w.url}')">
            `;

            gallery.appendChild(div);
        }
    });
}

/* FILTER */
function filter(category) {
    renderWallpapers(category);
}

/* SEARCH */
function searchWallpapers() {
    let input = document.getElementById("searchBox").value.toLowerCase();

    let filtered = wallpapers.filter(w =>
        w.category.toLowerCase().includes(input)
    );

    renderFiltered(filtered);
}

/* FILTERED */
function renderFiltered(list) {
    let gallery = document.getElementById("gallery");
    gallery.innerHTML = "";

    list.forEach(w => {
        let div = document.createElement("div");
        div.className = "wallpaper";

        div.innerHTML = `
            <img src="${w.url}" onclick="openViewer('${w.url}')">
        `;

        gallery.appendChild(div);
    });
}

/* VIEWER */
function openViewer(url) {
    document.getElementById("viewerImg").src = url;
    document.getElementById("downloadBtn").href = url;
    document.getElementById("viewer").style.display = "flex";
}

function closeViewer() {
    document.getElementById("viewer").style.display = "none";
}

/* INIT */
renderWallpapers("all");
</script>

</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Wallpaper World Pro</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body {
    margin: 0;
    font-family: Arial, sans-serif;
    background: radial-gradient(circle at top, #1a1a2e, #0b0b0f);
    color: white;
}

/* HEADER (PREMIUM GLASS STYLE) */
header {
    text-align: center;
    padding: 30px;
    background: rgba(255, 255, 255, 0.05);
    backdrop-filter: blur(12px);
    border-bottom: 1px solid rgba(255,255,255,0.1);
}

header h1 {
    margin: 0;
    font-size: 32px;
}

header p {
    opacity: 0.7;
}

/* SEARCH */
#searchBox {
    margin-top: 12px;
    padding: 12px;
    width: 60%;
    border-radius: 25px;
    border: none;
    outline: none;
    text-align: center;
    font-size: 15px;
}

/* CATEGORIES */
.categories {
    display: flex;
    justify-content: center;
    gap: 12px;
    flex-wrap: wrap;
    padding: 18px;
}

.cat {
    background: rgba(255,255,255,0.08);
    padding: 10px 16px;
    border-radius: 25px;
    cursor: pointer;
    transition: 0.3s;
    backdrop-filter: blur(10px);
    border: 1px solid rgba(255,255,255,0.1);
}

.cat:hover {
    background: #ff00cc;
    transform: scale(1.05);
}

/* GALLERY (PINTEREST STYLE) */
.gallery {
    column-count: 4;
    column-gap: 15px;
    padding: 20px;
}

@media (max-width: 1000px) {
    .gallery { column-count: 3; }
}

@media (max-width: 700px) {
    .gallery { column-count: 2; }
}

@media (max-width: 500px) {
    .gallery { column-count: 1; }
}

.wallpaper {
    break-inside: avoid;
    margin-bottom: 15px;
    border-radius: 15px;
    overflow: hidden;
    cursor: pointer;
    position: relative;
    transition: 0.3s;
}

.wallpaper img {
    width: 100%;
    border-radius: 15px;
    transition: 0.4s;
    display: block;
}

.wallpaper:hover img {
    transform: scale(1.08);
    filter: brightness(1.1);
}

/* VIEWER (MODERN OVERLAY) */
.viewer {
    display: none;
    position: fixed;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    background: rgba(0,0,0,0.92);
    justify-content: center;
    align-items: center;
    flex-direction: column;
    z-index: 999;
}

.viewer img {
    max-width: 90%;
    max-height: 80%;
    border-radius: 15px;
    box-shadow: 0 10px 40px rgba(0,0,0,0.6);
}

/* BUTTON */
.btn {
    margin-top: 15px;
    padding: 12px 22px;
    background: linear-gradient(90deg, #ff00cc, #3333ff);
    border: none;
    color: white;
    border-radius: 25px;
    cursor: pointer;
    font-size: 15px;
    transition: 0.3s;
}

.btn:hover {
    transform: scale(1.05);
}

.close {
    position: absolute;
    top: 20px;
    right: 25px;
    font-size: 32px;
    cursor: pointer;
}
</style>
</head>

<body>

<header>
    <h1>🔥 Wallpaper World Pro</h1>
    <p>Premium HD Wallpapers for PC & Mobile</p>

    <input id="searchBox" type="text"
    placeholder="Search wallpapers..."
    onkeyup="searchWallpapers()">
</header>

<!-- CATEGORIES -->
<div class="categories">
    <div class="cat" onclick="filter('all')">All</div>
    <div class="cat" onclick="filter('nature')">Nature</div>
    <div class="cat" onclick="filter('anime')">Anime</div>
    <div class="cat" onclick="filter('cars')">Cars</div>
</div>

<!-- GALLERY -->
<div class="gallery" id="gallery"></div>

<!-- VIEWER -->
<div class="viewer" id="viewer">
    <span class="close" onclick="closeViewer()">×</span>
    <img id="viewerImg">
    <a id="downloadBtn" class="btn" download>Download Wallpaper</a>
</div>

<script>

let wallpapers = [];

fetch("data/wallpapers.json")
.then(res => res.json())
.then(data => {
    wallpapers = data;
    renderWallpapers("all");
});

/* RENDER */
function renderWallpapers(category) {
    let gallery = document.getElementById("gallery");
    gallery.innerHTML = "";

    wallpapers.forEach(w => {
        if (category === "all" || w.category === category) {
            let div = document.createElement("div");
            div.className = "wallpaper";

            div.innerHTML = `
                <img src="${w.url}" onclick="openViewer('${w.url}')">
            `;

            gallery.appendChild(div);
        }
    });
}

/* FILTER */
function filter(category) {
    renderWallpapers(category);
}

/* SEARCH */
function searchWallpapers() {
    let input = document.getElementById("searchBox").value.toLowerCase();

    let filtered = wallpapers.filter(w =>
        w.category.toLowerCase().includes(input)
    );

    renderFiltered(filtered);
}

/* FILTER RENDER */
function renderFiltered(list) {
    let gallery = document.getElementById("gallery");
    gallery.innerHTML = "";

    list.forEach(w => {
        let div = document.createElement("div");
        div.className = "wallpaper";

        div.innerHTML = `
            <img src="${w.url}" onclick="openViewer('${w.url}')">
        `;

        gallery.appendChild(div);
    });
}

/* VIEWER */
function openViewer(url) {
    document.getElementById("viewerImg").src = url;
    document.getElementById("downloadBtn").href = url;
    document.getElementById("viewer").style.display = "flex";
}

function closeViewer() {
    document.getElementById("viewer").style.display = "none";
}

</script>

</body>
</html>

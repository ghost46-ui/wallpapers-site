<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Wallpaper World</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body {
    margin: 0;
    font-family: Arial, sans-serif;
    background: #0b0b0f;
    color: white;
}

/* HEADER */
header {
    text-align: center;
    padding: 30px;
    background: linear-gradient(90deg, #ff00cc, #3333ff);
}

h1 { margin: 0; }

/* CATEGORY BUTTONS */
.categories {
    display: flex;
    justify-content: center;
    flex-wrap: wrap;
    gap: 10px;
    padding: 20px;
}

.cat {
    padding: 10px 15px;
    background: #222;
    border-radius: 20px;
    cursor: pointer;
    transition: 0.3s;
}

.cat:hover {
    background: #ff00cc;
}

/* GALLERY */
.gallery {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
    gap: 15px;
    padding: 20px;
}

.wallpaper {
    border-radius: 15px;
    overflow: hidden;
    position: relative;
}

.wallpaper img {
    width: 100%;
    height: 300px;
    object-fit: cover;
    transition: transform 0.4s;
}

.wallpaper:hover img {
    transform: scale(1.1);
}

/* HIDE SYSTEM */
.hidden {
    display: none;
}
</style>
</head>

<body>

<header>
    <h1>🔥 Wallpaper World</h1>
    <p>Download HD Wallpapers for PC & Mobile</p>
</header>

<!-- CATEGORY BUTTONS -->
<div class="categories">
    <div class="cat" onclick="filter('all')">All</div>
    <div class="cat" onclick="filter('nature')">Nature</div>
    <div class="cat" onclick="filter('anime')">Anime</div>
    <div class="cat" onclick="filter('cars')">Cars</div>
</div>

<!-- GALLERY -->
<div class="gallery">

    <div class="wallpaper nature">
        <img src="https://images.unsplash.com/photo-1501785888041-af3ef285b470">
    </div>

    <div class="wallpaper nature">
        <img src="https://images.unsplash.com/photo-1441974231531-c6227db76b6e">
    </div>

    <div class="wallpaper cars">
        <img src="https://images.unsplash.com/photo-1503376780353-7e6692767b70">
    </div>

    <div class="wallpaper anime">
        <img src="https://images.unsplash.com/photo-1618336753974-aae8e04506aa">
    </div>

</div>

<script>
function filter(category) {
    let items = document.querySelectorAll('.wallpaper');

    items.forEach(item => {
        if (category === 'all') {
            item.style.display = 'block';
        } else {
            if (item.classList.contains(category)) {
                item.style.display = 'block';
            } else {
                item.style.display = 'none';
            }
        }
    });
}
</script>

</body>
</html>

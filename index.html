<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Wallpaper World Pro</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body {
    margin: 0;
    font-family: Arial;
    background: #0b0b0f;
    color: white;
}

/* HEADER */
header {
    text-align: center;
    padding: 25px;
    background: linear-gradient(90deg, #ff00cc, #3333ff);
}

/* SEARCH */
#searchBox {
    padding: 10px;
    width: 60%;
    border-radius: 20px;
    border: none;
    margin-top: 10px;
}

/* CATEGORIES */
.categories {
    display: flex;
    justify-content: center;
    gap: 10px;
    flex-wrap: wrap;
    padding: 15px;
}

.cat {
    background: #222;
    padding: 10px 15px;
    border-radius: 20px;
    cursor: pointer;
}

.cat:hover {
    background: #ff00cc;
}

/* GALLERY */
.gallery {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
    gap: 15px;
    padding: 20px;
}

.wallpaper img {
    width: 100%;
    height: 300px;
    object-fit: cover;
    border-radius: 15px;
    cursor: pointer;
    transition: 0.3s;
}

.wallpaper img:hover {
    transform: scale(1.05);
}

/* VIEWER */
.viewer {
    display: none;
    position: fixed;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    background: rgba(0,0,0,0.95);
    justify-content: center;
    align-items: center;
    flex-direction: column;
}

.viewer img {
    max-width: 90%;
    max-height: 80%;
    border-radius: 10px;
}

.btn {
    margin-top: 15px;
    padding: 10px 20px;
    background: #ff00cc;
    border: none;
    color: white;
    border-radius: 20px;
    cursor: pointer;
}

.close {
    position: absolute;
    top: 20px;
    right: 20px;
    font-size: 30px;
    cursor: pointer;
}
</style>
</head>

<body>

<header>
    <h1>🔥 Wallpaper World Pro</h1>
    <p>Auto-loaded wallpapers system</p>

    <!-- SEARCH BOX -->
    <input id="searchBox" type="text" placeholder="Search wallpapers..."
    onkeyup="searchWallpapers()">
</header>

<!-- CATEGORIES -->
<div class="categories">
    <div class="cat" onclick="filter('all')">All</div>
    <div class="cat" onclick="filter('nature')">Nature</div>
    <div class="cat" onclick="filter('anime')">Anime</div>
    <div class="cat" onclick="filter('cars')">Cars</div>
</div>

<!-- GALLERY -->
<div class="gallery" id="gallery"></div>

<!-- VIEWER -->
<div class="viewer" id="viewer">
    <span class="close" onclick="closeViewer()">×</span>
    <img id="viewerImg">
    <a id="downloadBtn" class="btn" download>Download</a>
</div>

<script>

let wallpapers = [];

/* LOAD WALLPAPERS FROM JSON */
fetch("data/wallpapers.json")
.then(res => res.json())
.then(data => {
    wallpapers = data;
    renderWallpapers("all");
});

/* RENDER WALLPAPERS */
function renderWallpapers(category) {
    let gallery = document.getElementById("gallery");
    gallery.innerHTML = "";

    wallpapers.forEach(w => {
        if (category === "all" || w.category === category) {

            let div = document.createElement("div");
            div.className = "wallpaper";

            div.innerHTML = `
                <img src="${w.url}" onclick="openViewer('${w.url}')">
            `;

            gallery.appendChild(div);
        }
    });
}

/* FILTER BUTTONS */
function filter(category) {
    renderWallpapers(category);
}

/* SEARCH FUNCTION */
function searchWallpapers() {
    let box = document.getElementById("searchBox");

    if (!box) return;

    let input = box.value.toLowerCase();

    let filtered = wallpapers.filter(w =>
        w.category.toLowerCase().includes(input)
    );

    renderFiltered(filtered);
}

/* RENDER FILTERED RESULTS */
function renderFiltered(list) {
    let gallery = document.getElementById("gallery");
    gallery.innerHTML = "";

    list.forEach(w => {
        let div = document.createElement("div");
        div.className = "wallpaper";

        div.innerHTML = `
            <img src="${w.url}" onclick="openViewer('${w.url}')">
        `;

        gallery.appendChild(div);
    });
}

/* OPEN IMAGE VIEWER */
function openViewer(url) {
    document.getElementById("viewerImg").src = url;
    document.getElementById("downloadBtn").href = url;
    document.getElementById("viewer").style.display = "flex";
}

/* CLOSE VIEWER */
function closeViewer() {
    document.getElementById("viewer").style.display = "none";
}

</script>

</body>
</html>

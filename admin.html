<script>
let API = "https://sheetdb.io/api/v1/uugsr2jejuml7";

async function addWallpaper() {
    let url = document.getElementById("imgUrl").value;
    let cat = document.getElementById("imgCat").value;

    if (!url) {
        alert("Please enter image URL");
        return;
    }

    let data = {
        data: {
            id: Date.now(),
            url: url,
            category: cat,
            downloads: 0
        }
    };

    try {
        let res = await fetch(API, {
            method: "POST",
            headers: {
                "Content-Type": "application/json"
            },
            body: JSON.stringify(data)
        });

        if (res.ok) {
            alert("✅ Wallpaper added successfully!");
            document.getElementById("imgUrl").value = "";
        } else {
            alert("❌ Failed to upload");
        }

    } catch (error) {
        alert("❌ Error connecting to SheetDB");
        console.log(error);
    }
}
</script>
